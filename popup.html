<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; width: 240px; padding: 12px; color: #222; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header h3 { font-size: 14px; }
    .status { font-size: 11px; color: #888; }

    .divider { border: none; border-top: 1px solid #eee; margin: 10px 0; }

    /* Quick toggle row */
    .toggle-row { display: flex; justify-content: space-between; align-items: center;
                  padding: 5px 0; font-size: 13px; }
    .toggle-row input { cursor: pointer; }

    /* Period quick-set */
    .period-row { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 5px 0; }
    .period-row input { width: 55px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px; }

    hr.divider { margin: 10px 0; }

    button { width: 100%; padding: 7px; margin-top: 5px; border: 1px solid #ccc;
             border-radius: 4px; cursor: pointer; font-size: 13px; background: #f8f8f8; }
    button:hover { background: #e8e8f0; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    button.primary:hover { background: #1558b0; }
  </style>
</head>
<body>
  <div class="header">
    <h3>⏸ Tab Suspender</h3>
  </div>
  <div class="status" id="status">Loading...</div>

  <hr class="divider">

  <div class="period-row">
    <span>Suspend after</span>
    <input type="number" id="period" min="1" max="1440">
    <span>min</span>
  </div>

  <div class="toggle-row">
    <label for="pinned">Protect pinned tabs</label>
    <input type="checkbox" id="pinned">
  </div>
  <div class="toggle-row">
    <label for="audio">Protect audio tabs</label>
    <input type="checkbox" id="audio">
  </div>
  <div class="toggle-row">
    <label for="forms">Protect form tabs</label>
    <input type="checkbox" id="forms">
  </div>
  <div class="toggle-row">
    <label for="idle_only">Idle-only mode</label>
    <input type="checkbox" id="idle_only">
  </div>

  <hr class="divider">

  <button class="primary" id="suspend-all">Suspend All Inactive Now</button>
  <button id="options">All Settings →</button>

  <script src="popup.js"></script>
</body>
</html>
